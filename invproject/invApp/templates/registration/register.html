{% extends 'layout.html' %}
{% load crispy_forms_tags %}


{% block title %} Register - Inventory System {% endblock %}

{% block content %}

<div class="row justify-content-center align-item-center ">
    <div class="card shadow-sm p-4  "  style="max-width: 400px; width: 100%;">
        <div class="card-header py-3 bg-primary text-center mb-0">
            <h2 class="text-dark fw-bold " style="letter-spacing: 2px;">Create an account</h2>
        </div>
        <p class="text-muted mt-3 text-center">Join the invoice management system</p>
        <form method="post" action="{% url 'register' %}" novalidate>
            {% csrf_token %}
            <div class="form-floating">
                {{ form | crispy}}
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg mb-3">Register</button>
        </form>
    <hr class="fw-bold ">    
        <div class="border-top pt-3 text-center bg-warning-subtle mt-3">
            <p class="lead">Already have an account:</p>
            <a href="{% url 'login' %}" class="text-success fw-bold h5 ">Login Here</a>
        </div>
    </div>
</div>
{% endblock %}
